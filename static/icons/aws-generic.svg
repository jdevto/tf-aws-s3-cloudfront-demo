<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="awsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="6" fill="url(#awsGradient)"/>
  
  <!-- AWS curved arrow logo style -->
  <g transform="translate(32, 32)">
    <!-- Curved arrow path -->
    <path d="M -12,-8 Q -8,-12 0,-12 Q 8,-12 12,-8 L 8,-4 Q 4,-8 0,-8 Q -4,-8 -8,-4 Z" 
          fill="white" opacity="0.95"/>
    <path d="M 8,-4 L 12,-8 L 16,-4 L 12,0 Z" fill="white" opacity="0.95"/>
    
    <!-- Additional curve for depth -->
    <path d="M -10,-6 Q -6,-10 0,-10 Q 6,-10 10,-6" 
          stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>
  
  <!-- AWS text -->
  <text x="32" y="50" font-family="Arial, sans-serif" font-size="9" font-weight="bold" 
        fill="white" text-anchor="middle" opacity="0.9">AWS</text>
</svg>
